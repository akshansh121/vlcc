services:
  postgres:
    image: postgres:15-alpine
    container_name: beauty-world-db
    environment:
      POSTGRES_DB: beauty_world
      POSTGRES_USER: beauty_admin
      POSTGRES_PASSWORD: beauty_password_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    networks:
      - beauty-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beauty_admin -d beauty_world"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: beauty-world-backend
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://beauty_admin:beauty_password_2024@postgres:5432/beauty_world
      JWT_SECRET: beauty_world_jwt_secret_key_2024_very_secure_string
      JWT_EXPIRES_IN: 7d
      PORT: 5000
      CORS_ORIGIN: https://sunderdikho.com,https://www.sunderdikho.com
      EMAIL_HOST: smtp.gmail.com
      EMAIL_PORT: 587
      EMAIL_USER: akshanshkr085@gmail.com
      EMAIL_PASS: slvneddqqyhycjxg
      EMAIL_FROM: akshanshkr085@gmail.com
      ADMIN_EMAIL: support@sunderdikho.com
      GOOGLE_CLIENT_ID: 964449766103-lt4id9t6df27jfdpab1em0r7tnokj3vs.apps.googleusercontent.com
      GOOGLE_CLIENT_SECRET: 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E
      FRONTEND_URL: https://sunderdikho.com
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "8000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - beauty-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.sunderdikho.com/api
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: 964449766103-lt4id9t6df27jfdpab1em0r7tnokj3vs.apps.googleusercontent.com
    container_name: beauty-world-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - beauty-network
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:

networks:
  beauty-network:
    driver: bridge
